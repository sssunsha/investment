<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>策略分析 — BaoStock API</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2d3250;
    --text: #e2e8f0;
    --text-dim: #8892a4;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --blue: #3b82f6;
    --cyan: #06b6d4;
    --purple: #a855f7;
    --orange: #f97316;
    --lime: #84cc16;
  }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    overflow-x: hidden;
  }

  /* ══════════════════════════════════════════════
     Page Header
  ════════════════════════════════════════════════ */
  .page-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 200;
  }
  .page-header h1 { font-size: 14px; font-weight: 700; }
  .breadcrumb-sep { color: var(--border); }

  .btn-home {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: border-color .15s, color .15s;
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }
  .btn-home:hover { border-color: var(--cyan); color: var(--cyan); }

  .header-date {
    margin-left: auto;
    font-size: 14px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── Guide drawer trigger ── */
  .btn-guide {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--purple);
    background: rgba(168,85,247,.08);
    color: var(--purple);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background .15s;
    font-family: inherit;
  }
  .btn-guide:hover { background: rgba(168,85,247,.18); }

  /* ══════════════════════════════════════════════
     Tab Bar
  ════════════════════════════════════════════════ */
  .tab-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab-btn {
    padding: 14px 22px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }

  .tab-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background .15s; }
  .tab-btn.active .tab-dot { background: var(--cyan); }

  /* ══════════════════════════════════════════════
     Tab Panels
  ════════════════════════════════════════════════ */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ══════════════════════════════════════════════
     Guide Drawer (slide from right)
  ════════════════════════════════════════════════ */
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 300;
    backdrop-filter: blur(2px);
  }
  .drawer-overlay.open { display: block; }

  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 80vw;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 301;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .drawer-title { font-size: 14px; font-weight: 700; flex: 1; }
  .drawer-close {
    padding: 4px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    line-height: 1;
    transition: color .15s;
    font-family: inherit;
  }
  .drawer-close:hover { color: var(--text); }

  .drawer-body {
    overflow-y: auto;
    flex: 1;
    padding: 28px 32px;
    line-height: 1.8;
  }

  /* ── Markdown-style rendering ── */
  .drawer-body h1 { font-size: 14px; font-weight: 700; color: var(--cyan); margin: 0 0 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .drawer-body h2 { font-size: 13px; font-weight: 700; color: var(--text); margin: 24px 0 10px; padding-left: 8px; border-left: 3px solid var(--cyan); }
  .drawer-body h3 { font-size: 14px; font-weight: 700; color: var(--text-dim); margin: 16px 0 8px; }
  .drawer-body p  { font-size: 13px; color: var(--text-dim); margin: 8px 0; }
  .drawer-body ul, .drawer-body ol { padding-left: 20px; font-size: 13px; color: var(--text-dim); margin: 8px 0; }
  .drawer-body li { margin: 5px 0; }
  .drawer-body strong { color: var(--text); font-weight: 700; }
  .drawer-body code { background: var(--surface2); padding: 2px 6px; border-radius: 3px; font-size: 14px; color: var(--cyan); }
  .drawer-body pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; overflow-x: auto; margin: 8px 0; }
  .drawer-body pre code { background: none; padding: 0; color: var(--lime); font-size: 14px; }
  .drawer-body hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .drawer-body blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--text-dim); margin: 8px 0; font-style: italic; }

  /* md table */
  .drawer-body table { width: 100%; border-collapse: collapse; font-size: 14px; margin: 10px 0; }
  .drawer-body th { background: var(--surface2); color: var(--text-dim); padding: 9px 12px; text-align: left; border: 1px solid var(--border); }
  .drawer-body td { padding: 9px 12px; border: 1px solid rgba(45,50,80,.5); color: var(--text-dim); }
  .drawer-body tr:hover td { background: var(--surface2); }

  /* ══════════════════════════════════════════════
     All Weather Panel Layout
  ════════════════════════════════════════════════ */
  .aw-layout {
    padding: 20px 24px 60px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── Section card ── */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .section-body { padding: 20px; }

  .section-head {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .section-icon { font-size: 14px; line-height: 1; flex-shrink: 0; }
  .section-title { font-size: 13px; font-weight: 700; flex: 1; }
  .section-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* ── Buttons ── */
  .btn {
    padding: 7px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    transition: opacity .15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .btn:hover { opacity: .85; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--cyan);    color: #000; }
  .btn-success { background: var(--green);   color: #000; }
  .btn-danger  { background: var(--red);     color: #fff; }
  .btn-ghost   { background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }
  .btn-sm { padding: 4px 10px; font-size: 13px; }

  /* ── Form grid ── */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }

  /* ── Category rows ── */
  .cat-row {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 10px;
    transition: background .25s, border-color .25s;
  }
  .cat-row:last-child { margin-bottom: 0; }

  /* ── Per-asset field highlight after calculation ── */
  .field-sell {
    background: rgba(239,68,68,.10);
    border-radius: 6px;
    padding: 8px;
    margin: -8px;
    border-left: 3px solid var(--red);
  }
  .field-buy {
    background: rgba(34,197,94,.10);
    border-radius: 6px;
    padding: 8px;
    margin: -8px;
    border-left: 3px solid var(--green);
  }
  .field-sell .form-input { border-color: rgba(239,68,68,.4); }
  .field-sell .form-input:focus { border-color: var(--red); }
  .field-buy  .form-input { border-color: rgba(34,197,94,.4); }
  .field-buy  .form-input:focus { border-color: var(--green); }

  .cat-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14px 18px;
    background: var(--surface2);
    border-right: 1px solid var(--border);
    min-width: 88px;
    gap: 4px;
    flex-shrink: 0;
  }
  .cat-name { font-size: 14px; font-weight: 700; white-space: nowrap; }
  .cat-pct  { font-size: 14px; color: var(--text-dim); }

  .cat-inputs {
    display: grid;
    flex: 1;
    padding: 14px 16px;
    gap: 12px;
  }
  .form-sub { font-size: 14px; color: var(--text-dim); margin-top: 2px; }

  .form-field { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 13px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
  .form-input, .form-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color .15s;
  }
  .form-input:focus, .form-select:focus { outline: none; border-color: var(--cyan); }
  .form-input.full { grid-column: 1 / -1; }

  /* ── Rebalance result table ── */
  .result-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin-top: 16px;
  }
  .result-table th {
    background: var(--surface2);
    color: var(--text-dim);
    padding: 9px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    white-space: nowrap;
  }
  .result-table td {
    padding: 9px 12px;
    border-bottom: 1px solid rgba(45,50,80,.4);
  }
  .result-table tr:last-child td { border-bottom: none; }
  .result-table tbody tr:hover td { background: var(--surface2); }

  .trigger-yes { color: var(--red);   font-weight: 700; }
  .trigger-no  { color: var(--green); font-weight: 700; }

  /* ── Operation chips ── */
  .op-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 700;
  }
  .op-sell { background: rgba(239,68,68,.15);  color: var(--red); }
  .op-buy  { background: rgba(34,197,94,.15);  color: var(--green); }
  .op-hold { background: rgba(136,146,164,.1); color: var(--text-dim); }

  /* ── Summary bar ── */
  .summary-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .sum-chip {
    padding: 5px 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    border: 1px solid;
  }
  .sum-sell { background: rgba(239,68,68,.1);  border-color: var(--red);    color: var(--red); }
  .sum-buy  { background: rgba(34,197,94,.1);  border-color: var(--green);  color: var(--green); }
  .sum-ok   { background: rgba(34,197,94,.08); border-color: var(--green);  color: var(--green); }
  .sum-info { background: rgba(6,182,212,.1);  border-color: var(--cyan);   color: var(--cyan); }

  /* ── Log table ── */
  .log-table-wrap {
    overflow-x: auto;
    overflow-y: auto;
    max-height: 400px;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .log-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    min-width: 720px;
  }
  .log-table thead { position: sticky; top: 0; z-index: 2; }
  .log-table th {
    background: var(--surface2);
    color: var(--text-dim);
    padding: 9px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    white-space: nowrap;
  }
  .log-table td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(45,50,80,.3);
    vertical-align: top;
  }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table tbody tr:hover td { background: rgba(34,197,94,.03); }

  .log-empty {
    padding: 40px;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
  }

  .log-ops-cell { display: flex; flex-wrap: wrap; gap: 4px; }

  .log-del-btn {
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: color .15s, border-color .15s;
  }
  .log-del-btn:hover { color: var(--red); border-color: var(--red); }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 11px; height: 11px;
    border: 2px solid var(--border);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Sector rotation styles (preserved) ── */
  .sr-layout { padding: 28px 40px 60px; max-width: 1400px; }
  .mdtfr-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; margin: 0 20px 16px; }
  .strategy-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .card-header { padding: 18px 24px; border-bottom: 1px solid var(--border); background: var(--surface2); display: flex; align-items: flex-start; gap: 14px; flex-wrap: wrap; }
  .card-icon { font-size: 14px; line-height: 1; flex-shrink: 0; margin-top: 2px; }
  .card-meta { flex: 1; min-width: 200px; }
  .card-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .card-subtitle { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
  .card-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .card-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
  .param-group { display: flex; align-items: center; gap: 6px; }
  .param-label { font-size: 13px; color: var(--text-dim); white-space: nowrap; }
  .param-select, .param-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 5px; font-size: 14px; font-family: inherit; cursor: pointer; transition: border-color .15s; }
  .param-select:focus, .param-input:focus { outline: none; border-color: var(--cyan); }
  .param-input { width: 70px; }
  .btn-run { background: var(--cyan); color: #000; }
  .signal-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .signal-chip { padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 700; border: 1px solid; display: flex; align-items: center; gap: 5px; }
  .chip-buy  { background: rgba(34,197,94,.1);   border-color: var(--green);  color: var(--green); }
  .chip-sell { background: rgba(239,68,68,.1);   border-color: var(--red);    color: var(--red); }
  .chip-hold { background: rgba(136,146,164,.1); border-color: var(--border); color: var(--text-dim); }
  .chip-info { background: rgba(6,182,212,.1);   border-color: var(--cyan);   color: var(--cyan); }
  .table-wrap { overflow-x: auto; overflow-y: auto; max-height: 440px; border: 1px solid var(--border); border-radius: 8px; }
  .data-table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 600px; }
  .data-table thead { position: sticky; top: 0; z-index: 2; }
  .data-table th { background: var(--surface2); color: var(--text-dim); padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 13px; }
  .data-table td { padding: 9px 12px; border-bottom: 1px solid rgba(45,50,80,.4); white-space: nowrap; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tbody tr:hover td { background: var(--surface2); }
  .pct { font-weight: 600; } .pos { color: var(--green); } .neg { color: var(--red); } .dim { color: var(--text-dim); }
  .tag-buy    { padding: 2px 8px; border-radius: 4px; font-size: 14px; font-weight: 700; background: rgba(34,197,94,.15); color: var(--green); }
  .tag-sell   { padding: 2px 8px; border-radius: 4px; font-size: 14px; font-weight: 700; background: rgba(239,68,68,.15);  color: var(--red); }
  .tag-hold   { padding: 2px 8px; border-radius: 4px; font-size: 14px; font-weight: 700; background: var(--surface2); color: var(--text-dim); }
  .tag-signal { padding: 2px 8px; border-radius: 4px; font-size: 14px; font-weight: 700; background: rgba(6,182,212,.15); color: var(--cyan); }
  .rank-badge { display: inline-flex; width: 22px; height: 22px; border-radius: 50%; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
  .rank-top { background: rgba(34,197,94,.2); color: var(--green); }
  .rank-mid { background: var(--surface2); color: var(--text-dim); }

  /* 持仓下拉 */
  .pos-select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 5px; padding: 3px 6px; font-size: 13px; font-family: inherit; cursor: pointer;
    width: 68px; outline: none; transition: border-color .15s;
  }
  .pos-select:hover, .pos-select:focus { border-color: var(--cyan); }
  .pos-select option { background: var(--surface2); }
  .pos-select[data-held="true"] { border-color: var(--yellow); color: var(--yellow); font-weight: 700; }

  /* ── 操作建议卡片 ── */
  .advice-mode-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 16px; border-radius: 8px; font-size: 14px; font-weight: 700;
    margin-bottom: 4px;
  }
  .advice-mode-badge.attack { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
  .advice-mode-badge.defend { background: rgba(59,130,246,.12); color: var(--blue); border: 1px solid rgba(59,130,246,.3); }
  .advice-mode-reason { font-size: 12px; color: var(--text-dim); margin: 4px 0 20px; line-height: 1.7; }
  .advice-section-title { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .advice-candidate {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; margin-bottom: 8px;
  }
  .advice-candidate.buy-item { border-left: 3px solid var(--red); }
  .advice-candidate.watch-item { border-left: 3px solid var(--yellow); }
  .advice-candidate .cand-rank { font-size: 18px; font-weight: 700; min-width: 28px; text-align: center; }
  .advice-candidate .cand-info { flex: 1; }
  .advice-candidate .cand-name { font-weight: 700; font-size: 14px; }
  .advice-candidate .cand-code { font-size: 12px; color: var(--text-dim); }
  .advice-candidate .cand-tags { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
  .advice-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .advice-tag.pass  { background: rgba(34,197,94,.15); color: var(--green); }
  .advice-tag.fail  { background: rgba(239,68,68,.12); color: var(--red); }
  .advice-tag.na    { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
  .advice-tag.warn  { background: rgba(245,158,11,.15); color: var(--yellow); }
  .advice-action-box {
    background: rgba(34,197,94,.06); border: 1px solid rgba(34,197,94,.2);
    border-radius: 8px; padding: 14px 18px; margin: 12px 0;
    font-size: 13px; color: var(--text);
  }

### 分批建仓计划（3个月完成）

| 批次 | 建仓时间 | 建仓比例 | 操作说明 |
|-----|---------|---------|---------|
| 第一期 | 第1个月 | 30% | 按目标比例买入各基金 |

**操作步骤**：

1. 计算每期每只基金的买入金额
2. 在交易日下午3点前完成申购

## 三、新增资金加仓策略

**计算公式**：

\`\`\`
单只基金加仓金额 = 新增资金 × 目标比例
或
单只基金加仓金额 = 新增资金 × (目标比例 - 当前比例) [优先补低配时]
\`\`\`

### 大额资金加仓（如年终奖）

1. **分2-3个月投入**，平滑市场波动风险
2. **优先补低配资产**，加速恢复目标比例
3. **记录加仓成本**，方便未来税务计算

## 四、紧急用钱减仓策略

### 减仓优先级原则

1. **持有期限优先**：先赎回持有超过1年的份额（免赎回费）
2. **盈利优先**：先赎回有盈利的份额
3. **比例维持**：尽量按当前比例赎回，保持配置平衡

**计算公式**：

\`\`\`
单只基金赎回金额 = 总赎回金额 × (该基金当前市值 ÷ 组合总市值)
\`\`\`

## 五、再平衡策略（详细表格版）

| 再平衡类型 | 判断时间点 | 触发条件 | 具体判断标准 |
|----------|---------|---------|------------|
| **定期再平衡** | 每季度末（3/6/9/12月最后一个交易日） | 时间固定触发 | 无论当前比例如何，季度末统一检查执行 |

| **债券内部再平衡** | 与阈值检查同时 | 国开债:国债比例偏离1:1 ±2% | (国开债比例 ÷ 国债比例) ≥ 1.2 或 ≤ 0.8 |

### 再平衡操作通用流程

1. **计算当前市值比例**：记录每个基金当前市值，计算占总资产比例
2. **识别偏离资产**：标记所有超出容忍范围（±4%）的资产

function renderMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // 代码块
    if (line.startsWith('```')) {
      let code = '';
      i++;
      while (i < lines.length && !lines[i].startsWith('```')) { code += lines[i] + '\n'; i++; }
      html += `<pre><code>${escHtml(code.trimEnd())}</code></pre>`;
      i++;
      continue;
    }

    // 标题
    if (line.startsWith('### ')) { html += `<h3>${inline(line.slice(4))}</h3>`; i++; continue; }
    if (line.startsWith('## '))  { html += `<h2>${inline(line.slice(3))}</h2>`; i++; continue; }
    if (line.startsWith('# '))   { html += `<h1>${inline(line.slice(2))}</h1>`; i++; continue; }

    // 水平线
    if (line.trim() === '---') { html += '<hr>'; i++; continue; }

    // 表格
    if (line.startsWith('|')) {
      let rows = [];
      while (i < lines.length && lines[i].startsWith('|')) {
        const row = lines[i].trim();
        // 跳过分隔行
        if (!row.replace(/[\|\-\:\s]/g, '')) { i++; continue; }
        const cells = row.slice(1, -1).split('|').map(c => inline(c.trim()));
        rows.push(cells);
        i++;
      }
      if (rows.length) {
        const head = rows[0].map(c => `<th>${c}</th>`).join('');
        const body = rows.slice(1).map(r => '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>').join('');
        html += `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
      }
      continue;
    }

    // 列表（有序/无序，支持嵌套缩进）
    if (/^(\s*)[-*] /.test(line) || /^(\s*)\d+\. /.test(line)) {
      html += buildList(lines, i);
      // 跳过已消耗的行
      while (i < lines.length && (/^(\s*)[-*] /.test(lines[i]) || /^(\s*)\d+\. /.test(lines[i]) || (lines[i].startsWith('  ') && i > 0))) {
        i++;
        if (i < lines.length && lines[i] === '') break;
      }
      continue;
    }

    // 空行
    if (line.trim() === '') { i++; continue; }

    // 普通段落
    html += `<p>${inline(line)}</p>`;
    i++;
  }
  return html;
}

function buildList(lines, startIdx) {
  // 收集连续的列表项（包含缩进子项）
  let items = [];
  let i = startIdx;
  while (i < lines.length) {
    const line = lines[i];
    if (line.trim() === '') break;
    const ulMatch = line.match(/^(\s*)[-*] (.+)$/);
    const olMatch = line.match(/^(\s*)\d+\. (.+)$/);
    if (ulMatch) { items.push({ indent: ulMatch[1].length, text: ulMatch[2], ordered: false }); i++; }
    else if (olMatch) { items.push({ indent: olMatch[1].length, text: olMatch[2], ordered: true }); i++; }
    else break;
  }
  if (!items.length) return '';

  function buildLevel(items, level) {
    let html = '';
    let j = 0;
    const tag = items[0]?.ordered ? 'ol' : 'ul';
    html += `<${tag}>`;
    while (j < items.length) {
      const item = items[j];
      html += `<li>${inline(item.text)}`;
      // 收集子项
      let children = [];
      j++;
      while (j < items.length && items[j].indent > item.indent) { children.push(items[j]); j++; }
      if (children.length) html += buildLevel(children, level + 1);
      html += '</li>';
    }
    html += `</${tag}>`;
    return html;
  }
  return buildLevel(items, 0);
}

function inline(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}

function calcRebalance() {
  const inputTotal = parseFloat(document.getElementById('total-assets').value) || 0;

  const assets = {};
  for (const a of PORTFOLIO) {
    assets[a.id] = parseFloat(document.getElementById('inp-' + a.id).value) || 0;
  }

  // ── 确定有效总市值 ──
  const assetSum = Object.values(assets).reduce((s, v) => s + v, 0);

  let total, totalMode;
  if (assetSum > 0) {
    // 各类别市值之和优先（无论总市值框是否填写）
    total = assetSum;
    if (inputTotal > 0 && Math.abs(inputTotal - assetSum) > 1) {
      // 两者都填且不一致：提示已用各类别之和修正
      totalMode = `⚠ 已用各类别市值之和修正：${fmtMoney(total)}（原填 ${fmtMoney(inputTotal)}）`;
      document.getElementById('total-assets').value = total.toFixed(2);
    } else if (inputTotal <= 0) {
      totalMode = `✦ 总市值由各类别自动加总：${fmtMoney(total)}`;
      document.getElementById('total-assets').value = total.toFixed(2);
    } else {
      totalMode = `✓ 各类别加总与填写总市值一致：${fmtMoney(total)}`;
    }
  } else if (inputTotal > 0) {
    // 仅填了总市值，没有任何类别值
    total = inputTotal;
    totalMode = `各类别均未填写市值，按填写总额计算：${fmtMoney(total)}`;
  } else {
    document.getElementById('total-hint').innerHTML = '<span style="color:var(--red)">⚠ 请至少填写一项资产市值或组合总市值</span>';
    return;
  }

  // 显示总市值来源提示
  document.getElementById('total-hint').innerHTML =
    `<span style="color:var(--text-dim)">${totalMode}</span>`;

  const weights = {};
  for (const a of PORTFOLIO) { weights[a.id] = assets[a.id] / total; }


  // ── Trigger checks ──
  const hs300w  = weights['hs300'];
  const zz500w  = weights['zz500'];
  const bond75w = weights['bond75'];
  const bond35w = weights['bond35'];

  const triggerResults = [];
  const triggeredTypes = [];

  // 1. 阈值再平衡 ±4%

  triggerResults.push({
    label: '阈值再平衡 (±4%)',
    triggered: threshAssets.length > 0,
    detail: threshAssets.length ? `触发：${threshAssets.map(a=>a.label).join('、')}` : '所有资产偏差 < 4%',
  });
  if (threshAssets.length) triggeredTypes.push('阈值再平衡');

  // 2. 极端情况 ±8%
  const extremeAssets = PORTFOLIO.filter(a => Math.abs(weights[a.id] - a.target) >= 0.08);
  triggerResults.push({
    label: '极端情况 (±8%)',
    triggered: extremeAssets.length > 0,
    detail: extremeAssets.length ? `触发：${extremeAssets.map(a=>a.label).join('、')}` : '无极端偏离',
  });
  if (extremeAssets.length) triggeredTypes.push('极端情况');

  // 3. 股票内部 2:1 ±3%
  const stockRatio = zz500w > 0 ? hs300w / zz500w : null;
  const stockTriggered = stockRatio != null && (stockRatio >= 2.3 || stockRatio <= 1.7);
  triggerResults.push({
    label: '股票内部 (2:1±3%)',
    triggered: stockTriggered,
    detail: stockRatio != null
      ? `沪深300/中证500 = ${stockRatio.toFixed(2)}（区间 [1.7, 2.3]）`
      : '中证500 为 0，无法计算',
  });
  if (stockTriggered) triggeredTypes.push('股票内部');

  // 4. 债券内部 1:1 ±2%
  const bondRatio = bond35w > 0 ? bond75w / bond35w : null;
  const bondTriggered = bondRatio != null && (bondRatio >= 1.2 || bondRatio <= 0.8);

    label: '债券内部 (1:1±2%)',

      ? `国开债/国债 = ${bondRatio.toFixed(2)}（区间 [0.8, 1.2]）`
      : '国债为 0，无法计算',
  });
  if (bondTriggered) triggeredTypes.push('债券内部');

  const anyTriggered = triggeredTypes.length > 0;

    ).join('');

  // ── Per-asset target amount & diff ──
  const ops = PORTFOLIO.map(a => {
    const currentVal = assets[a.id];
    const targetVal  = total * a.target;
    const diff       = targetVal - currentVal;  // positive = need to buy
    const currentPct = weights[a.id];
    const drift      = currentPct - a.target;   // positive = overweight
    return { ...a, currentVal, targetVal, diff, currentPct, drift };
  });

  // Highlight input fields: red = sell, green = buy, default = hold
  highlightInputs(ops);

  // ── Render comparison rows ──
  document.getElementById('compare-rows').innerHTML = ops.map(op => {
    const isSell   = op.diff < -1;
    const isBuy    = op.diff >  1;
    const rowClass = isSell ? 'row-sell' : isBuy ? 'row-buy' : 'row-hold';
    const arrow    = isSell ? '↓' : isBuy ? '↑' : '→';
    const arrowCls = isSell ? 'arrow-sell' : isBuy ? 'arrow-buy' : 'arrow-hold';
    const opLabel  = isSell ? '赎 回' : isBuy ? '申 购' : '持 有';
    const opLblCls = isSell ? 'op-lbl-sell' : isBuy ? 'op-lbl-buy' : 'op-lbl-hold';
    const opAmtCls = isSell ? 'op-amt-sell' : isBuy ? 'op-amt-buy' : '';
    const driftPct = (op.drift * 100);
    const driftStr = (driftPct >= 0 ? '+' : '') + driftPct.toFixed(1) + '%';
    const driftCls = op.drift >  0.04 ? 'drift-hi' : op.drift < -0.04 ? 'drift-lo' : 'drift-ok';
    const accentColor = ASSET_COLORS[op.group];
    return `
      <div class="compare-row ${rowClass}">
        <div class="compare-cell">
          <div class="compare-fund-name" style="color:${accentColor}">${op.name}</div>
          <div class="compare-fund-sub">${op.label} · ${op.code}</div>
          <div class="compare-value">${fmtMoney(op.currentVal)}</div>
          <div class="compare-pct">
            ${(op.currentPct*100).toFixed(1)}%
            <span class="drift-badge ${driftCls}">${driftStr}</span>
          </div>
        </div>
        <div class="compare-mid-cell">
          <div class="compare-arrow ${arrowCls}">${arrow}</div>
          <div class="compare-op-label ${opLblCls}">${opLabel}</div>
          ${(isSell || isBuy)
            ? `<div class="compare-op-amount ${opAmtCls}">${isSell ? '-' : '+'}${fmtMoney(Math.abs(op.diff))}</div>`
            : `<div style="font-size:13px;color:var(--text-dim)">无需调整</div>`}
        </div>
        <div class="compare-cell right">
          <div class="compare-fund-name" style="color:${accentColor}">${op.name}</div>
          <div class="compare-fund-sub">${op.label}</div>
          <div class="compare-value">${fmtMoney(op.targetVal)}</div>
          <div class="compare-pct right" style="color:var(--text-dim)">${(op.target*100).toFixed(0)}%（目标）</div>
        </div>
      </div>`;
  }).join('');

  // ── Summary bar ──
  const sells     = ops.filter(o => o.diff < -1);
  const buys      = ops.filter(o => o.diff >  1);
  const totalSell = sells.reduce((s, o) => s + Math.abs(o.diff), 0);
  const totalBuy  = buys.reduce((s,  o) => s + o.diff, 0);

  document.getElementById('calc-summary').innerHTML = anyTriggered
    ? `<span class="sum-chip sum-sell">↓ 赎回合计：${fmtMoney(totalSell)}</span>
       <span class="sum-chip sum-buy">↑ 申购合计：${fmtMoney(totalBuy)}</span>
       <span class="sum-chip sum-info" style="margin-left:auto">触发：${triggeredTypes.join(' / ')}</span>`
    : `<span class="sum-chip sum-ok">✓ 所有触发点均未触发，投资组合无需调整</span>`;

  // ── Operation plans ──
  if (anyTriggered && (sells.length > 0 || buys.length > 0)) {
    document.getElementById('op-plans').style.display = 'block';

    // Plan 1: Direct conversion – greedy match sellers → buyers
    const sellQ = sells.map(o => ({ ...o, rem: Math.abs(o.diff) }));
    const buyQ  = buys.map(o => ({ ...o, rem: o.diff }));
    const convPairs = [];
    let si = 0, bi = 0;
    while (si < sellQ.length && bi < buyQ.length) {
      const s = sellQ[si], b = buyQ[bi];
      const amt = Math.min(s.rem, b.rem);
      if (amt > 1) convPairs.push({ from: s, to: b, amount: amt });
      s.rem -= amt; b.rem -= amt;
      if (s.rem < 1) si++;
      if (b.rem < 1) bi++;
    }
    const extraSells = sellQ.filter(s => s.rem > 1);
    const extraBuys  = buyQ.filter(b => b.rem > 1);

    document.getElementById('plan-convert').innerHTML = `
      <div class="op-plan-head">
        <span>⚡</span><span>方案一：直接转换</span>
        <span class="op-plan-head-sub">同平台一步到位，无需等待资金到账</span>
      </div>
      <div class="op-plan-body">
        <div class="op-step">
          <div class="op-step-title">转换操作（共 ${convPairs.length} 笔）</div>
          <div class="op-step-items">
            ${convPairs.map(c => `
              <div class="op-convert-row">
                <div class="convert-from">↓ ${c.from.name}<div style="font-size:14px;color:var(--text-dim);font-weight:400">${c.from.code}</div></div>
                <span class="convert-arrow-icon">→</span>
                <div class="convert-to">↑ ${c.to.name}<div style="font-size:14px;color:var(--text-dim);font-weight:400">${c.to.code}</div></div>
                <span class="convert-amount">${fmtMoney(c.amount)}</span>
              </div>`).join('')}
          </div>
        </div>
        ${extraSells.length ? `
          <div class="op-step">
            <div class="op-step-title">⚠ 额外赎回（无对应申购匹配）</div>
            <div class="op-step-items">
              ${extraSells.map(s => `
                <div class="op-step-item sell-item">
                  <div class="op-item-meta">
                    <span class="op-item-name">${s.name}</span>
                    <span class="op-item-sub">${s.code}</span>
                  </div>
                  <span class="op-item-amount">-${fmtMoney(s.rem)}</span>
                </div>`).join('')}
            </div>
          </div>` : ''}
        ${extraBuys.length ? `
          <div class="op-step">
            <div class="op-step-title">⚠ 额外申购（超出赎回金额）</div>
            <div class="op-step-items">
              ${extraBuys.map(b => `
                <div class="op-step-item buy-item">
                  <div class="op-item-meta">
                    <span class="op-item-name">${b.name}</span>
                    <span class="op-item-sub">${b.code}</span>
                  </div>
                  <span class="op-item-amount">+${fmtMoney(b.rem)}</span>
                </div>`).join('')}
            </div>
          </div>` : ''}
        <div class="op-footnote">* 直接转换需平台支持（天天基金、蚂蚁财富等均支持跨公司转换）。转换当日完成，资金无需经过银行卡。</div>
      </div>`;

    // Plan 2: Sell then buy (stepwise)
    document.getElementById('plan-stepwise').innerHTML = `
      <div class="op-plan-head">
        <span>🔄</span><span>方案二：卖出后再买入</span>
        <span class="op-plan-head-sub">分步操作，适用所有平台</span>
      </div>
      <div class="op-plan-body">
        <div class="op-step">
          <div class="op-step-title">第一步（当日）：赎回超配资产</div>
          <div class="op-step-items">
            ${sells.map(s => `
              <div class="op-step-item sell-item">
                <div class="op-item-meta">
                  <span class="op-item-name">${s.name}</span>
                  <span class="op-item-sub">${s.code} · ${(s.currentPct*100).toFixed(1)}% → ${(s.target*100).toFixed(0)}%</span>
                </div>
                <span class="op-item-amount">-${fmtMoney(Math.abs(s.diff))}</span>
              </div>`).join('')}
          </div>
          <div class="op-footnote">* 赎回后 T+1～T+3 工作日到账。利用等待期间完成申购准备。</div>
        </div>
        <div class="op-step">
          <div class="op-step-title">第二步（资金到账后）：申购低配资产</div>
          <div class="op-step-items">
            ${buys.map(b => `
              <div class="op-step-item buy-item">
                <div class="op-item-meta">
                  <span class="op-item-name">${b.name}</span>
                  <span class="op-item-sub">${b.code} · ${(b.currentPct*100).toFixed(1)}% → ${(b.target*100).toFixed(0)}%</span>
                </div>
                <span class="op-item-amount">+${fmtMoney(b.diff)}</span>
              </div>`).join('')}
          </div>
          <div class="op-footnote">* 若赎回资金分批到账，可按各基金到账比例分批申购，降低短期波动风险。</div>
        </div>
      </div>`;

    document.getElementById('save-log-btn').style.display = 'inline-flex';
    lastCalcResult = {
      total,
      weights,
      ops: [...sells.map(o => ({ op: '赎回', name: o.name, code: o.code, amount: Math.abs(o.diff) })),
            ...buys.map(o  => ({ op: '申购', name: o.name, code: o.code, amount: o.diff }))],
      triggers: triggeredTypes,
    };
  } else {
    document.getElementById('op-plans').style.display = 'none';
    document.getElementById('save-log-btn').style.display = 'none';
    lastCalcResult = null;
  }

  document.getElementById('calc-result').style.display = 'block';
}

// Operation Log (localStorage)
// ══════════════════════════════════════════════════════
const LOG_KEY = 'aw_rebalance_log';

function loadLog() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY) || '[]'); } catch { return []; }
}

function saveLogData(data) {
  localStorage.setItem(LOG_KEY, JSON.stringify(data));
}

function renderLog() {
  const logs = loadLog();
  const tbody = document.getElementById('log-tbody');
  if (!logs.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="log-empty">暂无操作记录 — 完成计算后点击"保存为操作记录"</td></tr>`;
    return;
  }
  tbody.innerHTML = logs.slice().reverse().map((entry, ri) => {
    const realIdx = logs.length - 1 - ri;
    const opsHtml = (entry.ops || []).map(o =>
      `<span class="op-chip ${o.op==='赎回'?'op-sell':'op-buy'}">${o.op} ${o.name} ${fmtMoney(o.amount)}</span>`
    ).join(' ');
    return `<tr>
      <td style="white-space:nowrap;font-weight:600">${entry.date}</td>
      <td style="font-size:13px;color:var(--text-dim)">${(entry.triggerTypes||[]).join('、') || '手动'}</td>
      <td style="white-space:nowrap">${fmtMoney(entry.total)}</td>
      <td><div class="log-ops-cell">${opsHtml}</div></td>
      <td style="font-size:13px;color:var(--text-dim)">${entry.note || '–'}</td>
      <td><button class="log-del-btn" onclick="deleteLog(${realIdx})">删除</button></td>
    </tr>`;
  }).join('');
}

function saveToLog() {
  if (!lastCalcResult) return;
  const note = prompt('备注（可选）：', '') ?? '';
  const entry = {
    date: new Date().toISOString().slice(0, 10),
    total: lastCalcResult.total,
    triggerTypes: [...new Set(lastCalcResult.triggers)],
    ops: lastCalcResult.ops,
    note,
    savedAt: new Date().toISOString(),
  };
  const logs = loadLog();
  logs.push(entry);
  saveLogData(logs);
  renderLog();
  alert('✓ 已保存操作记录');
}

function deleteLog(idx) {
  if (!confirm('确认删除该条记录？')) return;
  const logs = loadLog();
  logs.splice(idx, 1);
  saveLogData(logs);
  renderLog();
}

function clearLog() {
  if (!confirm('确认清空所有操作记录？此操作不可撤销。')) return;
  saveLogData([]);
  renderLog();
}

function exportLog() {
  const data = loadLog();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `rebalance_log_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importLog(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('格式错误');
      if (!confirm(`确认导入 ${data.length} 条记录？将覆盖现有记录。`)) return;
      saveLogData(data);
      renderLog();
      alert(`✓ 已导入 ${data.length} 条记录`);
    } catch (err) {
      alert('导入失败：' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── IndexedDB helpers ──────────────────────────────────
const IDB_NAME    = 'investment_v1';
const IDB_VERSION = 1;
const IDB_STORE   = 'mdtfr_pool';

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE))
        db.createObjectStore(IDB_STORE);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}
async function idbPut(key, value) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(IDB_STORE, 'readwrite');
    const req = tx.objectStore(IDB_STORE).put(value, key);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}
async function idbDelete(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(IDB_STORE, 'readwrite');
    const req = tx.objectStore(IDB_STORE).delete(key);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}
async function clearMdtfrCache() {
  const today = new Date().toISOString().slice(0, 10);

}

function mdtfrLog(level, msg) {
  const ts = new Date().toTimeString().slice(0,8);
  _mdtfrLogs.push({ts, level, msg});
  const el = document.getElementById('mdtfr-debug-log');
  if (!el) return;
  const color = level==='error'?'var(--red)':level==='ok'?'var(--green)':level==='cache'?'var(--purple)':level==='done'?'var(--cyan)':'var(--text-dim)';
  el.innerHTML += `<div><span style="color:var(--border)">[${ts}]</span> <span style="color:${color}">[${level.toUpperCase()}]</span> ${escHtml(msg)}</div>`;
  el.scrollTop = el.scrollHeight;
}
function toggleMdtfrDebug() {
  const drawer = document.getElementById('debug-drawer');
  if (drawer.classList.contains('open')) {
    closeDebugDrawer();
  } else {
    drawer.classList.add('open');
    document.getElementById('debug-drawer-overlay').classList.add('open');
    const log = document.getElementById('mdtfr-debug-log');
    if (log) log.scrollTop = log.scrollHeight;
  }
}
function closeDebugDrawer() {
  document.getElementById('debug-drawer').classList.remove('open');
  document.getElementById('debug-drawer-overlay').classList.remove('open');
}
function clearMdtfrDebug() {
  _mdtfrLogs = [];
  const el = document.getElementById('mdtfr-debug-log');
  if (el) el.innerHTML = '';
}

// ── 表格初始化（骨架行，维护原始顺序）─────────────────
// ── 仅在未初始化时渲染空表格，并尝试从 IndexedDB 填充当日缓存 ──
async function mdtfrMaybeInitEmpty() {
  const body = document.getElementById('mdtfr-body');
  if (!body || !body.querySelector('.empty-state')) return; // 已有表格，跳过
  mdtfrInitTable(false); // 先渲染空表格结构
  const today = new Date().toISOString().slice(0, 10);
  try {
    const cached = await idbGet(today);
    if (cached && Array.isArray(cached) && cached.length > 0) {
      cached.forEach(mdtfrFillRow);
      mdtfrFillRanks(cached);
      mdtfrRenderAdvice(cached);
      document.getElementById('mdtfr-last-updated').textContent = `缓存数据 · ${today}`;
      mdtfrLog('cache', `页面初始化：命中今日缓存（${cached.length} 条）`);
    }
  } catch(e) {
    mdtfrLog('error', `读取缓存失败: ${e.message}`);
  }
}

// ── 表格初始化（skeleton=true 显示加载动画，false 显示空占位）─

      const cfg = {宽基:['rgba(59,130,246,.15)','var(--blue)','📊 宽基'],行业:['rgba(6,182,212,.15)','var(--cyan)','⚙ 行业'],防御:['rgba(168,85,247,.15)','var(--purple)','🛡 防御']};

        : '';

    })()}</td>
    <td style="font-weight:600">${escHtml(def.name)}</td>
    <td style="color:var(--text-dim);font-size:13px">${def.code_c}</td>
    <td style="color:var(--text-dim);font-size:13px">${def.code_a}</td>
    <td style="color:var(--text-dim);font-size:13px">${def.etf}</td>
    <td id="mdtfr-close-${def.code_c}">${skeleton ? '<div class="skeleton" style="width:70%"></div>' : dash}</td>
    <td id="mdtfr-ret-${def.code_c}">${skeleton ? '<div class="skeleton" style="width:60%"></div>' : dash}</td>
    <td id="mdtfr-ma20-${def.code_c}">${skeleton ? '<div class="skeleton" style="width:55%"></div>' : dash}</td>
    <td id="mdtfr-ma60-${def.code_c}">${skeleton ? '<div class="skeleton" style="width:55%"></div>' : dash}</td>

  body.innerHTML = `
    <div class="mdtfr-table-wrap">

        <thead><tr>
          <th>排名</th><th>属性</th><th>名称</th><th>C类代码</th><th>A类代码</th><th>场内ETF</th>
          <th>最新收盘</th><th>近20日涨跌</th><th>收盘/MA20</th><th>MA60趋势</th><th>持仓情况(%)</th>
        </tr></thead>
        <tbody>${MDTFR_POOL_DEF.map(mkRow).join('')}</tbody>
      </table>
    </div>`;
}

// ── 填充单行数据 ───────────────────────────────────────
function mdtfrFillRow(item) {
  const c = item.code_c;
  if (item.error) {
    document.getElementById(`mdtfr-close-${c}`).innerHTML = `<span style="color:var(--text-dim);font-size:12px">${escHtml(item.error)}</span>`;
    ['ret','ma20','ma60'].forEach(k => { document.getElementById(`mdtfr-${k}-${c}`).textContent = '–'; });
    return;
  }
  const ret = item.ret_20d;
  const retColor = ret > 0 ? 'var(--red)' : ret < 0 ? 'var(--green)' : 'var(--text-dim)';
  const retStr   = ret != null ? (ret>0?'+':'') + (ret*100).toFixed(2)+'%' : '–';

  document.getElementById(`mdtfr-close-${c}`).innerHTML =
    `${item.latest_close!=null?item.latest_close.toFixed(3):'–'}<span style="color:var(--border);font-size:12px;margin-left:4px">${item.latest_date||''}</span>`;
  document.getElementById(`mdtfr-ret-${c}`).innerHTML =
    `<span style="font-weight:700;color:${retColor}">${retStr}</span>`;
  document.getElementById(`mdtfr-ma20-${c}`).innerHTML = item.above_ma20==null ? '<span style="color:var(--border)">–</span>'
    : item.above_ma20 ? '<span style="color:var(--red)">↑ 站上</span>' : '<span style="color:var(--green)">↓ 跌破</span>';
  document.getElementById(`mdtfr-ma60-${c}`).innerHTML = (() => {
    const trend = item.ma60_trend;
    if (!trend) return '<span style="color:var(--border)">–</span>';
    const rate = item.ma60_rate != null ? `<span style="font-size:11px;opacity:.7;margin-left:3px">${item.ma60_rate>0?'+':''}${item.ma60_rate.toFixed(2)}%</span>` : '';
    const cfg = {
      '明确上行': ['var(--red)',    '↑↑'],
      '温和上行': ['var(--red)',    '↑ '],
      '走平':     ['var(--yellow)', '→ '],
      '温和下行': ['var(--green)',  '↓ '],
      '明确下行': ['var(--green)',  '↓↓'],
    };
    const [color, arrow] = cfg[trend] || ['var(--border)', '–'];
    return `<span style="color:${color}">${arrow} ${trend}</span>${rate}`;
  })();
}

// ── 计算并填充排名 ─────────────────────────────────────
function mdtfrFillRanks(items) {
  const valid = items.filter(x => !x.error && x.ret_20d != null);
  valid.sort((a, b) => b.ret_20d - a.ret_20d);
  valid.forEach((x, i) => { x.rank = i + 1; });
  items.forEach(x => {
    const el = document.getElementById(`mdtfr-rank-${x.code_c}`);
    if (!el) return;
    if (x.rank == null) { el.innerHTML = '<span style="color:var(--border)">–</span>'; return; }
    const color = x.ret_20d > 0 ? 'var(--red)' : x.ret_20d < 0 ? 'var(--green)' : 'var(--text-dim)';
    const bg    = x.ret_20d > 0 ? 'rgba(239,68,68,.2)' : x.ret_20d < 0 ? 'rgba(34,197,94,.2)' : 'var(--surface2)';
    el.innerHTML = `<span class="rank-badge" style="background:${bg};color:${color}">${x.rank}</span>`;
  });
  // 有数据后显示排序按钮
  const sortBtn = document.getElementById('mdtfr-sort-btn');
  if (sortBtn) sortBtn.style.display = '';
}

// ══════════════════════════════════════════════════════
// 操作建议分析
// ══════════════════════════════════════════════════════

// 防守模式可选标的（C类代码）
const DEFENSE_CODES = new Set(['006131','006382','007467','000217']);

// ── 持仓状态（localStorage 持久化）────────────────────────
const _pos = (() => {
  try { return JSON.parse(localStorage.getItem('mdtfr_pos') || '{}'); } catch { return {}; }
})();
let _lastMdtfrItems = null;

function getPosVal(code_c) { return _pos[code_c] || '0'; }

function onPosChange(code_c, val) {
  const newVal = parseInt(val) || 0;
  const oldVal = parseInt(_pos[code_c] || '0');
  // 计算其他标的当前总仓位（不含本标的）
  const otherTotal = MDTFR_POOL_DEF
    .filter(d => d.code_c !== code_c)
    .reduce((sum, d) => sum + (parseInt(_pos[d.code_c] || '0')), 0);
  if (otherTotal + newVal > 100) {
    const max = Math.max(0, 100 - otherTotal);
    // 回退到不超限的最大合法值
    const allowed = ['50','35','15','0'].find(v => parseInt(v) <= max) || '0';
    // 重置 select DOM
    const sel = document.querySelector(`select.pos-select[data-code="${code_c}"]`);
    if (sel) { sel.value = allowed; sel.dataset.held = allowed !== '0'; }
    // 提示用户
    const cur = _pos[code_c] || '0';
    alert(`总仓位不能超过 100%。其他标的已占 ${otherTotal}%，本标的最多可设置 ${max}%，已自动调整为 ${allowed}%。`);
    _pos[code_c] = allowed;
  } else {
    _pos[code_c] = String(newVal);
  }
  try { localStorage.setItem('mdtfr_pos', JSON.stringify(_pos)); } catch {}
  if (_lastMdtfrItems) mdtfrRenderAdvice(_lastMdtfrItems);
}

function mkPosSelect(code_c) {
  const cur = getPosVal(code_c);
  const opts = ['0','15','35','50'].map(v =>
    `<option value="${v}"${cur===v?' selected':''}>${v}</option>`
  ).join('');
  const held = cur !== '0';
  return `<select class="pos-select" data-code="${code_c}" data-held="${held}" onchange="onPosChange('${code_c}',this.value);this.dataset.held=this.value!=='0'">${opts}</select>`;
}

function mdtfrBuildAdvice(items) {
  const valid = items.filter(x => !x.error && x.ret_20d != null && x.latest_close != null);
  if (valid.length === 0) return null;

  // ── 市场模式判断（两个独立 OR 条件）────────────────────
  const hs300 = valid.find(x => x.code_c === '006131');
  const cond1 = !!(hs300 && hs300.ma60 != null && hs300.latest_close > hs300.ma60);
  const aboveMa20Count = valid.filter(x => x.above_ma20).length;
  const aboveMa20Pct   = valid.length > 0 ? aboveMa20Count / valid.length : 0;
  const cond2 = aboveMa20Pct >= 0.8;
  const isAttack = cond1 || cond2;

  // 两个条件的文字说明（供 condRow 使用）
  const modeCond1Text = `沪深300 收盘价 > 60日均线（主条件）`;
  const modeCond1Note = hs300 && hs300.ma60 != null
    ? `收盘 ${hs300.latest_close?.toFixed(3)} ${cond1?'>':'≤'} MA60 ${hs300.ma60?.toFixed(3)}`
    : '数据不足';
  const modeCond2Text = `≥ 80% 标的收盘价站在20日均线上方（辅助条件）`;
  const modeCond2Note = `${aboveMa20Count}/${valid.length} 只站上MA20（${(aboveMa20Pct*100).toFixed(0)}%，阈值80%）`;

  // ── 候选池（基于模式筛选）────────────────────────────
  const pool = isAttack ? valid : valid.filter(x => DEFENSE_CODES.has(x.code_c));
  const ranked = [...pool].sort((a, b) => b.ret_20d - a.ret_20d);
  ranked.forEach((x, i) => { x._poolRank = i + 1; });

  // ── 买入筛选（只取前2，四条须同时满足）────────────────
  const top2 = ranked.slice(0, 2);
  top2.forEach(x => {
    x._c1 = x._poolRank <= 2;
    x._c2 = x.ret_20d != null && x.ret_20d >= 0.03;
    x._c3 = x.above_ma20 === true;
    x._c4 = x.ma60_rising === true;
    x._allPass = x._c1 && x._c2 && x._c3 && x._c4;
  });
  const buyCandidates = top2.filter(x => x._allPass);

  // ── 全局排名（先于持仓计算，确保 _globalRank 写入原对象）──
  const allRanked = [...valid].sort((a,b) => b.ret_20d - a.ret_20d);
  allRanked.forEach((x, i) => { x._globalRank = i + 1; });

  // ── 持仓（从全局 _pos 读取；此时 valid 对象已含 _globalRank）──
  const holdings = valid.filter(x => parseInt(getPosVal(x.code_c)) > 0)
    .map(x => ({ ...x, _posVal: parseInt(getPosVal(x.code_c)) }));

  // 条件1：趋势破位（跌破MA20）
  const sellBelowMa20 = holdings.filter(x => x.above_ma20 === false);
  // 条件2：排名跌出前6
  const sellOutTop6   = holdings.filter(x => x._globalRank > 6);
  // 条件3/4：仓位/止损需人工确认

  return {
    isAttack, cond1, cond2,
    modeCond1Text, modeCond1Note, modeCond2Text, modeCond2Note,
    pool, ranked, top2, buyCandidates,
    holdings, sellBelowMa20, sellOutTop6,
    valid, aboveMa20Count, aboveMa20Pct, hs300,
  };
}

function mdtfrRenderAdvice(items) {
  const card  = document.getElementById('mdtfr-advice-card');
  const body  = document.getElementById('mdtfr-advice-body');
  const tspan = document.getElementById('mdtfr-advice-time');
  if (!card || !body) return;

  _lastMdtfrItems = items;
  const advice = mdtfrBuildAdvice(items);
  if (!advice) { card.style.display = 'none'; return; }

  tspan.textContent = `分析时间: ${new Date().toTimeString().slice(0,8)}`;
  const {
    isAttack, cond1, cond2,
    modeCond1Text, modeCond1Note, modeCond2Text, modeCond2Note,
    pool, ranked, top2, buyCandidates,
    holdings, sellBelowMa20, sellOutTop6, valid,
  } = advice;

  const fmtRet  = (r) => r != null ? (r>0?'+':'') + (r*100).toFixed(2) + '%' : '–';
  const rclr    = (r) => r == null ? 'var(--text-dim)' : r > 0 ? 'var(--red)' : 'var(--green)';

  // 条款行：✓ 白色 / ✗ 灰色 / ○ 灰色
  const condRow = (pass, docText, note) => {
    const icon = pass === true ? '✓' : pass === false ? '✗' : '○';
    const iclr = pass === true ? 'var(--green)' : pass === false ? 'var(--red)' : 'var(--text-dim)';
    const tclr = pass === true ? 'var(--text)' : 'var(--text-dim)';
    return `<div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:flex-start">
      <span style="color:${iclr};font-size:14px;flex-shrink:0;width:16px;margin-top:1px">${icon}</span>
      <div style="flex:1;min-width:0">
        <span style="color:${tclr};font-size:13px">${docText}</span>
        ${note ? `<span style="color:var(--text-dim);font-size:12px;margin-left:6px">— ${note}</span>` : ''}
      </div>
    </div>`;
  };

  // ── 1. 综合操作结论（合并买入+卖出信号）──────────────────
  // 判断持仓标的是否已是买入候选（无需换仓）
  const holdingCodes  = new Set(holdings.map(x => x.code_c));
  const buyCodes      = new Set(buyCandidates.map(x => x.code_c));
  const urgentSell    = sellOutTop6;                                     // 排名跌出前6：立即卖出
  const watchSell     = sellBelowMa20.filter(x => !sellOutTop6.includes(x)); // 仅跌破MA20（非前6触发）：关注
  const alreadyHeld   = buyCandidates.filter(x => holdingCodes.has(x.code_c));
  const toBuy         = buyCandidates.filter(x => !holdingCodes.has(x.code_c));
  const toSellUrgent  = urgentSell.filter(x => !buyCodes.has(x.code_c));  // 需卖出且不在买入候选
  const toSwap        = urgentSell.filter(x => buyCodes.has(x.code_c));   // 需卖出但恰好是买入候选（罕见）

  // 确定综合结论的 type
  let finalType, finalTitle, finalColor, finalBg, finalBorder, finalLines = [];

  const hasSell    = urgentSell.length > 0;
  const hasBuy     = buyCandidates.length > 0;
  const holdingMatch = holdings.length > 0
    && buyCandidates.length > 0
    && buyCandidates.every(x => holdingCodes.has(x.code_c))
    && holdings.length === buyCandidates.length;

  if (!hasSell && holdingMatch) {
    // 持仓与买入候选完全一致，无需操作
    finalType   = 'hold';
    finalTitle  = '维持现仓，无需操作';
    finalColor  = 'var(--cyan)';
    finalBg     = 'rgba(6,182,212,.06)';
    finalBorder = 'rgba(6,182,212,.25)';
    finalLines  = [`持仓标的 ${holdings.map(x=>`${x.name}(${x._posVal}%)`).join('、')} 仍满足所有买入条件，且无卖出信号`];
  } else if (hasSell && hasBuy) {
    // 有卖出信号，也有新的买入候选 → 换仓
    finalType   = 'swap';
    finalTitle  = `换仓操作`;
    finalColor  = 'var(--yellow)';
    finalBg     = 'rgba(245,158,11,.06)';
    finalBorder = 'rgba(245,158,11,.3)';
    urgentSell.forEach(x => finalLines.push(`① 卖出 ${x.name}（排名跌至 #${x._globalRank}，超出前6）`));
    watchSell.forEach(x => finalLines.push(`⚠ 关注 ${x.name}（跌破MA20，确认连续2日后减仓至15%）`));
    buyCandidates.forEach((x,i) => finalLines.push(`${['②','③'][i]||'→'} 买入 ${x.name} · ${x.code_c}，仓位 50%`));
  } else if (hasSell && !hasBuy) {
    // 有卖出信号，无买入候选 → 卖出转货币基金
    finalType   = 'sell';
    finalTitle  = `卖出，转货币基金`;
    finalColor  = 'var(--red)';
    finalBg     = 'rgba(239,68,68,.06)';
    finalBorder = 'rgba(239,68,68,.3)';
    urgentSell.forEach(x => finalLines.push(`① 卖出 ${x.name}（排名跌至 #${x._globalRank}）→ 转入货币基金`));
    watchSell.forEach(x => finalLines.push(`⚠ 关注 ${x.name}（跌破MA20，确认连续2日后减仓至15%）`));
    finalLines.push('当前无满足条件的买入标的，卖出资金转入货币基金等待');
  } else if (!hasSell && hasBuy && toBuy.length > 0) {
    // 无卖出，有新的买入目标（当前未持仓 or 换标的）
    finalType   = 'buy';
    finalTitle  = buyCandidates.length >= 2
      ? `买入 ${buyCandidates.map(x=>x.name).join(' + ')}`
      : `买入 ${buyCandidates[0].name}（单仓 50%）`;
    finalColor  = 'var(--green)';
    finalBg     = 'rgba(34,197,94,.06)';
    finalBorder = 'rgba(34,197,94,.3)';
    buyCandidates.forEach((x,i) =>
      finalLines.push(`${['①','②'][i]||'→'} 买入 ${x.name} · ${x.code_c}，仓位 50%`));
    if (buyCandidates.length === 1)
      finalLines.push('仅1只满足条件，余50%仓位转入货币基金');
  } else if (!hasSell && watchSell.length > 0) {
    finalType   = 'watch';
    finalTitle  = '持仓观察，关注MA20';
    finalColor  = 'var(--yellow)';
    finalBg     = 'rgba(245,158,11,.06)';
    finalBorder = 'rgba(245,158,11,.2)';
    watchSell.forEach(x => finalLines.push(`⚠ ${x.name} 跌破MA20，若连续2日有效跌破则减仓至15%`));
  } else {
    finalType   = 'wait';
    finalTitle  = holdings.length > 0 ? '持仓等待，无操作信号' : '空仓等待';
    finalColor  = 'var(--text-dim)';
    finalBg     = 'rgba(255,255,255,.03)';
    finalBorder = 'rgba(255,255,255,.1)';
    finalLines  = [holdings.length > 0
      ? '持仓标的无卖出信号，当前买入候选未满足全部条件，继续持有等待下次复盘'
      : '当前无满足买入条件的标的，保持空仓，资金转入货币基金'];
  }

  const finalHtml = `
    <div style="background:${finalBg};border:1px solid ${finalBorder};border-radius:10px;padding:16px 18px;margin-top:4px">
      <div style="font-size:20px;font-weight:800;color:${finalColor};line-height:1.4;margin-bottom:10px">${finalTitle}</div>
      ${finalLines.map(l => `<div style="font-size:13px;color:var(--text);line-height:1.8;padding-left:2px">${l}</div>`).join('')}
      ${holdings.length > 0 ? `<div style="font-size:12px;color:var(--text-dim);margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)">当前持仓：${holdings.map(x=>`${x.name} ${x._posVal}%`).join('、')}　总仓位：${holdings.reduce((s,x)=>s+x._posVal,0)}%</div>` : ''}
    </div>`;

  // ── 2. 选股规则 ───────────────────────────────────────────
  // 2a 模式判断（两行 OR 条件）
  const modeSummary = isAttack
    ? `→ <b style="color:var(--red)">进攻模式</b>（任一满足即可）`
    : `→ <b style="color:var(--blue)">防守模式</b>（两条均不满足）`;
  const modeHtml = `
    ${condRow(cond1, modeCond1Text, modeCond1Note)}
    ${condRow(cond2, modeCond2Text, modeCond2Note)}
    <div style="padding:6px 0 6px 26px;font-size:13px">${modeSummary}</div>`;

  // 2b 基于模式筛选候选池
  const poolText = isAttack
    ? `进攻模式：12只标的全部纳入候选，正常执行动量轮动选股`
    : `防守模式：仅可从沪深300、中证500、红利低波动、黄金（4只）中选择买入`;
  const poolNote = `候选池 ${pool.length} 只` + (isAttack ? '' : `（防御标的）`) +
    `，动量最高：${ranked[0]?.name||'–'} ${fmtRet(ranked[0]?.ret_20d)}`;
  const stockRulesHtml = modeHtml + condRow(null, poolText, poolNote);

  // ── 3. 买入条件（只分析前2，标的名称前打✓✗）──────────────
  const buyDetailHtml = top2.map(x => {
    const pass = x._allPass;
    const nameIcon = pass ? '✓' : '✗';
    const nameClr  = pass ? 'var(--green)' : 'var(--red)';
    const border   = pass ? 'rgba(34,197,94,.3)'   : 'rgba(255,255,255,.1)';
    const bg       = pass ? 'rgba(34,197,94,.06)'  : 'rgba(255,255,255,.03)';
    return `<div style="margin:8px 0;padding:10px 14px;border-radius:8px;background:${bg};border:1px solid ${border}">
      <div style="font-size:14px;font-weight:700;margin-bottom:6px">
        <span style="color:${nameClr};margin-right:6px">${nameIcon}</span>
        <span style="color:var(--text)">${escHtml(x.name)}</span>
        <span style="color:var(--text-dim);font-weight:400;font-size:12px;margin-left:8px">${x.code_c} · 候选池排名 #${x._poolRank}</span>
      </div>
      ${condRow(x._c1, '过去20个交易日涨跌幅排名前2', `排名 #${x._poolRank}`)}
      ${condRow(x._c2, '过去20个交易日涨幅 ≥ 3%（绝对动量门槛，过滤弱势标的）',
        `近20日 <span style="color:${rclr(x.ret_20d)}">${fmtRet(x.ret_20d)}</span>`)}
      ${condRow(x._c3, '收盘价站上20日均线',
        `收盘 ${x.latest_close?.toFixed(3)} ${x._c3?'>':'≤'} MA20 ${x.ma20?.toFixed(3)}`)}
      ${condRow(x._c4, '60日均线向上（中长期趋势向好，避免逆势买入）',
        `${x.ma60_trend||'N/A'}${x.ma60_rate!=null?' '+(x.ma60_rate>0?'+':'')+x.ma60_rate.toFixed(2)+'%':''}`)}
    </div>`;
  }).join('');

  const opBoxHtml = buyCandidates.length >= 2
    ? `<div style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:6px;padding:9px 14px;font-size:13px;margin-top:6px">✓ 满足2只 — 等金额买入，各仓位约 <b>50%</b></div>`
    : buyCandidates.length === 1
    ? `<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:6px;padding:9px 14px;font-size:13px;margin-top:6px">△ 满足1只 — 买入该只，仓位 <b>50%</b>，剩余转货币基金</div>`
    : `<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:9px 14px;font-size:13px;color:var(--text-dim);margin-top:6px">✗ 满足0只 — 保持空仓，等待下次复盘</div>`;

  // ── 4. 卖出条件（按持仓标的逐条判断）────────────────────
  let sellHtml;
  if (holdings.length === 0) {
    sellHtml = `<div style="color:var(--text-dim);font-size:13px;padding:10px 0">暂无持仓记录，请在表格中设置「持仓情况(%)」</div>`;
  } else {
    // sellCondRow: ✓(green)=条件触发(需卖出)  ✗(gray)=未触发(安全)  ○=无法自动判断
    const sellCondRow = (triggered, warnText, safeText, note) => {
      const icon = triggered === true ? '✓' : triggered === false ? '✗' : '○';
      const iclr = triggered === true ? 'var(--green)' : triggered === false ? 'var(--text-dim)' : 'var(--text-dim)';
      const tclr = triggered === true ? 'var(--text)' : 'var(--text-dim)';
      const text = triggered === true ? warnText : safeText;
      return `<div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:flex-start">
        <span style="color:${iclr};font-size:14px;flex-shrink:0;width:16px;margin-top:1px">${icon}</span>
        <div style="flex:1;min-width:0">
          <span style="color:${tclr};font-size:13px">${text}</span>
          ${note ? `<span style="color:var(--text-dim);font-size:12px;margin-left:6px">— ${note}</span>` : ''}
        </div>
      </div>`;
    };

    sellHtml = holdings.map(x => {
      // triggered=true 表示该卖出条件已触发，需要操作
      const rankTriggered = x._globalRank > 6;
      const ma20Triggered = x.above_ma20 === false;
      const posTriggered  = null;   // 需人工确认
      const lossTriggered = null;   // 需人工确认

      const rankNote = rankTriggered
        ? `当前全局排名 #${x._globalRank}，已跌出前6 → 建议立即卖出`
        : `当前全局排名 #${x._globalRank}，仍在前6`;
      const ma20Note = ma20Triggered
        ? `收盘 ${x.latest_close?.toFixed(3)} ≤ MA20 ${x.ma20?.toFixed(3)} → 确认连续2日后减仓至15%`
        : `收盘 ${x.latest_close?.toFixed(3)} > MA20 ${x.ma20?.toFixed(3)}`;

      const anyTriggered = rankTriggered || ma20Triggered;
      const border = anyTriggered ? 'rgba(34,197,94,.3)'  : 'rgba(255,255,255,.08)';
      const bg     = anyTriggered ? 'rgba(34,197,94,.06)' : 'rgba(255,255,255,.02)';
      const nameClr = anyTriggered ? 'var(--green)' : 'var(--text-dim)';
      const nameIcon = anyTriggered ? '✓' : '✗';

      return `<div style="margin:8px 0;padding:10px 14px;border-radius:8px;background:${bg};border:1px solid ${border}">
        <div style="font-size:14px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px">
          <span style="color:${nameClr}">${nameIcon}</span>
          <span style="color:var(--text)">${escHtml(x.name)}</span>
          <span style="color:var(--text-dim);font-size:12px;font-weight:400">${x.code_c}</span>
          <span style="font-size:12px;color:var(--yellow);font-weight:600;margin-left:auto">持仓 ${x._posVal}%</span>
        </div>
        ${sellCondRow(rankTriggered,
          '排名过滤：近20日涨幅排名跌出前6名 → 立即卖出该ETF，找到替代标的则换仓，否则转货币基金',
          '排名过滤：近20日涨幅排名仍在前6名内，无需操作',
          rankNote)}
        ${sellCondRow(ma20Triggered,
          '趋势破位：收盘价已跌破20日均线 → 若连续2日有效跌破则立即减仓至15%；若继续跌破MA60 → 清仓',
          '趋势完好：收盘价站上20日均线，暂无破位信号',
          ma20Note)}
        ${sellCondRow(posTriggered,
          '仓位控制：仓位已超过50% → 立即卖出超额部分，补入另一只或转货币基金',
          '仓位控制：仓位未超过50%，无需操作',
          `持仓 ${x._posVal}%，需人工确认是否因涨幅超过50%`)}
        ${sellCondRow(lossTriggered,
          '止损强制减仓：持仓亏损超过10% → 强制减仓50%，无论其他条件是否触发',
          '止损强制减仓：持仓亏损未超过10%，无需操作',
          '需人工对比买入成本价确认是否亏损超10%')}
      </div>`;
    }).join('');
  }

  // ── 组装 ────────────────────────────────────────────────
  const mod = (icon, title, content) => `
    <div style="margin-top:20px">
      <div style="font-size:13px;font-weight:700;color:var(--cyan);margin-bottom:4px;display:flex;align-items:center;gap:6px">
        <span>${icon}</span><span>${title}</span>
      </div>${content}
    </div>`;

  body.innerHTML = `
    <div style="padding:20px 20px 16px;border-bottom:1px solid var(--border)">
      <div style="margin-bottom:12px">
        <span class="advice-mode-badge ${isAttack?'attack':'defend'}">${isAttack?'⚔ 进攻模式':'🛡 防守模式'}</span>
      </div>
      ${finalHtml}
    </div>
    <div style="padding:4px 20px 24px">
      ${mod('📋', '选股规则', stockRulesHtml)}
      ${mod('✅', '买入条件（四条须同时满足）', buyDetailHtml + opBoxHtml)}
      ${mod('⚠',  '卖出条件（任意触发立即执行）', sellHtml)}
    </div>`;

  card.style.display = '';
}

// ── 排名排序 / 恢复原始顺序 ────────────────────────────────
let _mdtfrSorted = false;

function toggleMdtfrSort() {
  const tbody = document.querySelector('#mdtfr-body tbody');
  if (!tbody) return;
  const btn = document.getElementById('mdtfr-sort-btn');

  if (!_mdtfrSorted) {
    // 按排名升序排列（无排名的行移到末尾）
    const rows = Array.from(tbody.querySelectorAll('tr'));
    rows.sort((a, b) => {
      const ra = parseInt(a.querySelector('[id^="mdtfr-rank-"] .rank-badge')?.textContent) || 999;
      const rb = parseInt(b.querySelector('[id^="mdtfr-rank-"] .rank-badge')?.textContent) || 999;
      return ra - rb;
    });
    rows.forEach(r => tbody.appendChild(r));
    btn.innerHTML = '↩ 恢复';
    btn.style.color = 'var(--cyan)';
    btn.style.borderColor = 'var(--cyan)';
    _mdtfrSorted = true;
  } else {
    // 恢复原始顺序（按 MDTFR_POOL_DEF 顺序）
    MDTFR_POOL_DEF.forEach(def => {
      const row = document.getElementById(`mdtfr-row-${def.code_c}`);
      if (row) tbody.appendChild(row);
    });
    btn.innerHTML = '↕ 排序';
    btn.style.color = '';
    btn.style.borderColor = '';
    _mdtfrSorted = false;
  }
}

// ── 从缓存渲染 ─────────────────────────────────────────
function mdtfrRenderFromCache(items) {
  mdtfrInitTable(true);
  items.forEach(mdtfrFillRow);
  mdtfrFillRanks(items);
}

// ── 判断单行数据是否完整 ──────────────────────────────────
function mdtfrRowComplete(item) {
  if (!item || item.error) return false;
  if (item.ret_20d == null || item.latest_close == null) return false;
  if (item.ma60_trend == null) return false;  // MA60 趋势未计算（数据不足）
  return true;
}

// ── 主入口：缓存优先，不完整行触发定向 SSE 补全 ─────────────
let _mdtfrEventSource = null;

async function loadMdtfrPool() {
  const btn = document.getElementById('mdtfr-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 检查缓存';
  clearMdtfrDebug();

  const today = new Date().toISOString().slice(0, 10);

  // 先确保表格结构存在
  const body = document.getElementById('mdtfr-body');
  if (body.querySelector('.empty-state')) mdtfrInitTable(false);

  // 读取今日缓存
  let cached = null;
  try { cached = await idbGet(today); } catch(e) { mdtfrLog('error', `读取缓存失败: ${e.message}`); }

  // 构建缓存 Map，检测不完整行
  const cachedMap = {};
  if (cached && Array.isArray(cached)) cached.forEach(x => { cachedMap[x.code_c] = x; });

  const incomplete = MDTFR_POOL_DEF.filter(def =>
    !mdtfrRowComplete(cachedMap[def.code_c])
  );

  if (incomplete.length === 0) {
    // 全部完整：直接渲染，不调用 SDK
    mdtfrLog('cache', `今日缓存完整（${cached.length} 条），跳过 SDK 分析`);
    cached.forEach(mdtfrFillRow);
    mdtfrFillRanks(cached);
    mdtfrRenderAdvice(cached);
    document.getElementById('mdtfr-last-updated').textContent = `缓存数据 · ${today}`;
    btn.disabled = false;
    btn.innerHTML = '↺ 刷新';
    return;
  }

  // 有不完整行：只对这些行设骨架屏，其余保持现有数据
  const incompleteCodes = new Set(incomplete.map(d => d.code_c));
  const skeletonCell = w => `<div class="skeleton" style="width:${w}"></div>`;

  if (Object.keys(cachedMap).length > 0) {
    // 先把完整缓存行填进去
    Object.values(cachedMap).filter(mdtfrRowComplete).forEach(mdtfrFillRow);
  }
  incomplete.forEach(def => {
    ['close','ret','ma20','ma60'].forEach((k, i) => {
      const el = document.getElementById(`mdtfr-${k}-${def.code_c}`);
      if (el) el.innerHTML = skeletonCell(['70%','60%','55%','55%'][i]);
    });
    const rankEl = document.getElementById(`mdtfr-rank-${def.code_c}`);
    if (rankEl) rankEl.innerHTML = skeletonCell('22px');
  });

  const codesParam = incomplete.map(d => d.code_c).join(',');
  const isPartial = incomplete.length < MDTFR_POOL_DEF.length;
  if (isPartial) {
    mdtfrLog('info', `缓存中 ${incomplete.length} 行不完整（${incomplete.map(d=>d.name).join('、')}），仅重新获取这些行`);
  } else {
    mdtfrLog('info', `无今日缓存，开始拉取全部数据 — ${today}`);
    mdtfrInitTable(true);
  }

  if (_mdtfrEventSource) { _mdtfrEventSource.close(); }

  // collected 从已有完整缓存出发，SSE 新数据会覆盖不完整行
  const collected = Object.values(cachedMap).filter(mdtfrRowComplete);
  const url = `/api/strategy/mdtfr-pool/stream${codesParam ? '?codes=' + codesParam : ''}`;
  const es = new EventSource(url);
  _mdtfrEventSource = es;

  // 将 collected 当前快照按文档顺序写入 IndexedDB
  const saveSnapshot = async (label) => {
    const snapshot = MDTFR_POOL_DEF
      .map(def => collected.find(x => x.code_c === def.code_c))
      .filter(Boolean);
    try {
      await idbPut(today, snapshot);
      if (label) mdtfrLog('cache', `已写入缓存 · ${label} · 共 ${snapshot.length} 条`);
    } catch(e) {
      mdtfrLog('error', `写入缓存失败: ${e.message}`);
    }
    return snapshot;
  };

  es.onmessage = async (e) => {
    let d;
    try { d = JSON.parse(e.data); } catch { return; }

    if (d.type === 'progress') {
      mdtfrLog('info', `[${d.name}] ${d.msg}`);
    } else if (d.type === 'item') {
      // 用新数据替换或追加到 collected，立即写入缓存
      const idx = collected.findIndex(x => x.code_c === d.code_c);
      if (idx >= 0) collected.splice(idx, 1, d); else collected.push(d);
      mdtfrFillRow(d);
      if (d.error) {
        mdtfrLog('error', `[${d.name}] ⚠ ${d.error}`);
      } else {
        const r = d.ret_20d != null ? (d.ret_20d>0?'+':'')+(d.ret_20d*100).toFixed(2)+'%' : '–';
        mdtfrLog('ok', `[${d.name}] 完成 · 近20日: ${r} · MA20:${d.above_ma20?'站上':'跌破'} · MA60:${d.ma60_trend||'N/A'}${d.ma60_rate!=null?' ('+(d.ma60_rate>0?'+':'')+d.ma60_rate.toFixed(2)+'%)':''}`);
      }
      await saveSnapshot(d.name);  // 每条数据到达即写入 IndexedDB
    } else if (d.type === 'error') {
      mdtfrLog('error', `BaoStock 错误: ${d.msg}`);
      es.close();
      btn.disabled = false; btn.innerHTML = '↺ 重试';
    } else if (d.type === 'done') {
      es.close();
      // 最终排名/建议在全部数据到齐后统一计算
      const orderedCollected = await saveSnapshot('全部完成');
      mdtfrFillRanks(orderedCollected);
      mdtfrRenderAdvice(orderedCollected);
      mdtfrLog('done', `补全完成 · ${d.last_updated}`);
      document.getElementById('mdtfr-last-updated').textContent = `已更新 · ${d.last_updated ? d.last_updated.slice(0,19) : today}`;
      btn.disabled = false; btn.innerHTML = '↺ 刷新';
    }
  };

  es.onerror = () => {
    mdtfrLog('error', 'SSE 连接中断');
    es.close();
    btn.disabled = false; btn.innerHTML = '↺ 重试';
  };
}

// ══════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════
function formatDate(d) {
  const days = ['日','一','二','三','四','五','六'];
  return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日  星期${days[d.getDay()]}`;
}

buildInputs();
renderLog();
document.getElementById('header-date').textContent = formatDate(new Date());

// 所有 const/函数定义完毕后，再执行 hash 路由初始化
(function() {
  const hash = location.hash.slice(1);
  if (hash && document.getElementById('tab-' + hash)) switchTab(hash);
  else mdtfrMaybeInitEmpty();
})();
