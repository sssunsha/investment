<!-- 分析页：微信文章列表风格 -->
<div class="page-analysis">

  <!-- 分类标签 -->
  <div class="tab-bar wechat-group">
    @for (tab of tabs; track tab) {
      <button class="tab-btn" [class.active]="activeTab === tab" (click)="activeTab = tab">
        {{ tab }}
      </button>
    }
  </div>

  <!-- 分析文章列表 -->
  <div class="wechat-group-label">最新分析</div>
  <div class="wechat-group">
    @for (item of analysisItems; track item.title) {
      <div class="wechat-cell analysis-cell">
        <div class="cell-body">
          <div class="analysis-title">{{ item.title }}</div>
          <div class="analysis-summary">{{ item.summary }}</div>
          <div class="analysis-meta">
            <span class="sentiment-tag"
                  [class]="'tag-' + item.sentiment">{{ sentimentLabel(item.sentiment) }}</span>
            <span class="meta-time">{{ item.time }}</span>
          </div>
        </div>
        <mat-icon class="chevron" style="color: #c8c8cd; flex-shrink: 0;">chevron_right</mat-icon>
      </div>
    }
  </div>

  <!-- AI 分析入口 -->
  <div class="wechat-group-label">AI 助手</div>
  <div class="wechat-group">
    <div class="wechat-cell">
      <div class="cell-icon" style="background: #07c160;">
        <mat-icon>psychology</mat-icon>
      </div>
      <div class="cell-body">
        <div class="cell-title">智能投资顾问</div>
        <div class="cell-desc">向 AI 提问，获取个性化投资建议</div>
      </div>
      <mat-icon class="chevron" style="color: #c8c8cd;">chevron_right</mat-icon>
    </div>
    <div class="wechat-cell">
      <div class="cell-icon" style="background: #1890ff;">
        <mat-icon>assessment</mat-icon>
      </div>
      <div class="cell-body">
        <div class="cell-title">组合诊断</div>
        <div class="cell-desc">分析持仓风险与优化建议</div>
      </div>
      <mat-icon class="chevron" style="color: #c8c8cd;">chevron_right</mat-icon>
    </div>
  </div>

</div>
