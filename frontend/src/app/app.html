@if (isHandset$ | async) {
  <!-- 手机/竖屏平板：微信风格布局 -->
  <div class="wc-mobile-layout">
    <!-- 顶部标题栏：白色背景，深色文字 -->
    <header class="wc-topbar">
      <span class="wc-topbar-title">{{ currentTitle }}</span>
      @if (showRefresh) {
        <button class="wc-topbar-action" (click)="onRefresh()" aria-label="刷新">
          <mat-icon>refresh</mat-icon>
        </button>
      }
    </header>

    <main class="wc-content">
      <router-outlet />
    </main>

    <!-- 底部导航栏：白色背景，微信绿激活 -->
    <nav class="wc-tabbar">
      @for (item of navItems; track item.route) {
        <a [routerLink]="item.route" routerLinkActive="active" class="wc-tab-item"
           (click)="currentTitle = item.label">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
  </div>
} @else {
  <!-- 平板横屏/桌面：微信 Web 风格双栏布局 -->
  <div class="wc-desktop-layout">
    <!-- 左侧窄导航栏 (仿微信 Mac/Web 版) -->
    <aside class="wc-sidebar">
      <div class="wc-sidebar-logo">
        <mat-icon>trending_up</mat-icon>
      </div>
      <nav class="wc-sidebar-nav">
        @for (item of navItems; track item.route) {
          <a [routerLink]="item.route" routerLinkActive="active" class="wc-sidebar-item"
             [title]="item.label" (click)="currentTitle = item.label">
            <mat-icon>{{ item.icon }}</mat-icon>
            <span class="sidebar-label">{{ item.label }}</span>
          </a>
        }
      </nav>
    </aside>

    <!-- 右侧内容区 -->
    <div class="wc-main">
      <header class="wc-topbar wc-topbar--desktop">
        <span class="wc-topbar-title">{{ currentTitle }}</span>
        @if (showRefresh) {
          <button class="wc-topbar-action" (click)="onRefresh()" aria-label="刷新">
            <mat-icon>refresh</mat-icon>
          </button>
        }
      </header>
      <main class="wc-desktop-content">
        <router-outlet />
      </main>
    </div>
  </div>
}
